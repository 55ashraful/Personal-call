<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta name="referrer" content="no-referrer">
<title>Personal Call</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--wa-dark:#111b21;--wa-panel:#1f2c34;--wa-bg:#0b141a;--wa-bar:#202c33;
--wa-teal:#00a884;--wa-teal-dark:#008f72;--wa-bubble-out:#005c4b;
--wa-bubble-in:#202c33;--wa-text:#e9edef;--wa-text2:#8696a0;--wa-text3:#667781;
--wa-border:#2a3942;--wa-overlay:rgba(0,0,0,0.6);--wa-danger:#ea0038;
--wa-tick:#53bdeb;--radius:8px;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#000;color:var(--wa-text);-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
input,textarea{-webkit-user-select:text;user-select:text}
#app{width:100%;height:100%;max-width:500px;margin:0 auto;position:relative;overflow:hidden;background:var(--wa-bg)}
@media(min-width:501px){#app{border-left:1px solid var(--wa-border);border-right:1px solid var(--wa-border)}}

.scr{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;visibility:hidden;transform:translateX(30px);transition:all .3s ease;pointer-events:none}
.scr.on{opacity:1;visibility:visible;transform:translateX(0);pointer-events:auto}
.scr.from-l{transform:translateX(-30px)}.scr.from-l.on{transform:translateX(0)}
.scr.slide-up{transform:translateY(100%)}.scr.slide-up.on{transform:translateY(0)}

#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:99999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);max-width:90%;text-align:center;pointer-events:none;background:var(--wa-panel);color:var(--wa-text);border:1px solid var(--wa-border)}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.err{color:var(--wa-danger)}#toast.ok{color:var(--wa-teal)}

.topbar{height:56px;background:var(--wa-bar);display:flex;align-items:center;padding:0 12px;flex-shrink:0;border-bottom:1px solid var(--wa-border);z-index:10}
.topbar .back{width:40px;height:40px;border:none;background:none;color:var(--wa-text2);display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:50%;flex-shrink:0}
.topbar .back:hover{background:rgba(255,255,255,.05)}
.topbar .back svg{width:24px;height:24px;fill:var(--wa-text2)}
.topbar .info{flex:1;min-width:0;margin-left:8px}
.topbar .info h3{font-size:16px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.topbar .info p{font-size:12px;color:var(--wa-text2);line-height:1.3}
.topbar .acts{display:flex;gap:4px;flex-shrink:0}
.tbtn{width:40px;height:40px;border:none;background:none;color:var(--wa-text2);display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:50%}
.tbtn:hover{background:rgba(255,255,255,.05)}
.tbtn svg{width:22px;height:22px;fill:var(--wa-text2)}
.av-sm{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--wa-panel)}

#phoneScr{background:var(--wa-bg);align-items:center;justify-content:center;padding:24px}
.login-bg{position:absolute;inset:0;overflow:hidden}
.login-bg::before{content:'';position:absolute;width:300px;height:300px;top:-100px;right:-80px;background:radial-gradient(circle,rgba(0,168,132,.08),transparent 70%)}
.login-bg::after{content:'';position:absolute;width:250px;height:250px;bottom:-80px;left:-60px;background:radial-gradient(circle,rgba(0,168,132,.06),transparent 70%)}
.login-card{width:100%;max-width:400px;position:relative;z-index:1;text-align:center}
.login-logo{width:72px;height:72px;margin:0 auto 20px;background:var(--wa-teal);border-radius:50%;display:flex;align-items:center;justify-content:center}
.login-logo svg{width:36px;height:36px;fill:#fff}
.login-card h1{font-size:24px;font-weight:600;color:var(--wa-teal);margin-bottom:4px}
.login-card .sub{font-size:13px;color:var(--wa-text2);margin-bottom:28px;line-height:1.5}
.fg{position:relative;margin-bottom:14px;text-align:left}
.fg input{width:100%;padding:14px 16px 14px 48px;background:var(--wa-panel);border:none;border-radius:var(--radius);color:var(--wa-text);font-size:14px;outline:none;transition:box-shadow .2s}
.fg input::placeholder{color:var(--wa-text3)}
.fg input:focus{box-shadow:0 0 0 2px var(--wa-teal)}
.fg .fi{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:20px;height:20px;fill:var(--wa-text3);pointer-events:none}
.fg input:focus~.fi{fill:var(--wa-teal)}
.pbtn{width:100%;padding:13px;border:none;border-radius:var(--radius);background:var(--wa-teal);color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s;margin-top:8px}
.pbtn:hover{background:var(--wa-teal-dark)}
.pbtn:disabled{opacity:.5;cursor:not-allowed}
.pbtn.gbtn{background:transparent;border:1px solid var(--wa-border);color:var(--wa-text);font-weight:400;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:10px}
.pbtn.gbtn:hover{background:rgba(255,255,255,.03)}
.pbtn.gbtn svg{width:20px;height:20px}
.lnk{background:none;border:none;color:var(--wa-teal);font-size:13px;cursor:pointer;margin-top:16px;display:inline-block}
.lnk:hover{text-decoration:underline}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--wa-text3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--wa-border)}

.otp-inputs{display:flex;gap:8px;justify-content:center;margin:20px 0}
.otp-inputs input{width:48px;height:52px;text-align:center;font-size:22px;font-weight:600;background:var(--wa-panel);border:2px solid var(--wa-border);border-radius:var(--radius);color:var(--wa-text);outline:none;transition:border-color .2s}
.otp-inputs input:focus{border-color:var(--wa-teal)}
.otp-resend{font-size:12px;color:var(--wa-text2);margin-top:12px}
.otp-resend button{background:none;border:none;color:var(--wa-teal);cursor:pointer;font-size:12px}
.otp-resend button:disabled{color:var(--wa-text3);cursor:not-allowed}

.tabs{display:flex;background:var(--wa-bar);border-bottom:1px solid var(--wa-border);flex-shrink:0}
.tab{flex:1;padding:14px 0;text-align:center;font-size:12.5px;font-weight:500;color:var(--wa-text3);cursor:pointer;position:relative;transition:color .2s;border:none;background:none}
.tab.on{color:var(--wa-teal)}
.tab.on::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:3px;background:var(--wa-teal);border-radius:3px 3px 0 0}

.chats-c{flex:1;overflow-y:auto;padding:4px 0}
.chats-c::-webkit-scrollbar{width:4px}
.chats-c::-webkit-scrollbar-thumb{background:var(--wa-border);border-radius:4px}
.chat-row{display:flex;align-items:center;padding:10px 14px;cursor:pointer;transition:background .15s;gap:12px}
.chat-row:hover{background:rgba(255,255,255,.03)}
.chat-row:active{background:rgba(255,255,255,.05)}
.chat-row .av{width:50px;height:50px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--wa-panel)}
.chat-row .det{flex:1;min-width:0;border-bottom:1px solid rgba(255,255,255,.04);padding-bottom:10px}
.chat-row .det h4{font-size:15px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px}
.chat-row .det h4 .tick{color:var(--wa-tick);font-size:16px}
.chat-row .det p{font-size:13px;color:var(--wa-text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.chat-row .meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.chat-row .meta .time{font-size:11px;color:var(--wa-text2)}
.chat-row .meta .badge{background:var(--wa-teal);color:#fff;font-size:11px;font-weight:600;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.unread .det h4,.unread .det p{color:var(--wa-text)!important;font-weight:500}

.msgs-c{flex:1;overflow-y:auto;padding:6px 14px;display:flex;flex-direction:column;gap:2px;background:var(--wa-bg);background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5c-1 8-3 12-8 18s-12 8-17 12c5 1 10 0 14-3 3-2 6-6 8-10 2 5 5 9 9 11 4 2 9 2 14 0-5-4-11-7-16-13S31 13 30 5z' fill='rgba(255,255,255,0.02)'/%3E%3C/svg%3E")}
.msgs-c::-webkit-scrollbar{width:4px}
.msgs-c::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
.date-sep{text-align:center;margin:10px 0}
.date-sep span{font-size:11.5px;color:var(--wa-text2);background:rgba(11,20,26,.9);padding:4px 12px;border-radius:6px}
.msg{max-width:80%;display:flex;flex-direction:column;animation:mi .25s ease}
.msg.out{align-self:flex-end;align-items:flex-end}
.msg.in{align-self:flex-start;align-items:flex-start}
@keyframes mi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.bbl{padding:6px 8px 8px;border-radius:8px;position:relative;word-break:break-word;font-size:14px;line-height:1.45}
.msg.out .bbl{background:var(--wa-bubble-out);border-top-right-radius:0}
.msg.in .bbl{background:var(--wa-bubble-in);border-top-left-radius:0}
.msg .mt{font-size:11px;color:var(--wa-text2);margin-top:2px;display:flex;align-items:center;gap:3px}
.msg.out .mt .tick{font-size:14px;color:var(--wa-tick)}
.typing-dots{display:inline-flex;gap:3px;padding:4px 0}
.typing-dots span{width:6px;height:6px;background:var(--wa-text2);border-radius:50%;animation:td 1.2s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}
.chat-bar{display:flex;align-items:flex-end;padding:6px 10px;gap:6px;background:var(--wa-bar);flex-shrink:0}
.chat-bar .input-wrap{flex:1;display:flex;align-items:flex-end;background:var(--wa-panel);border-radius:24px;padding:6px 14px;min-height:44px;gap:8px}
.chat-bar textarea{flex:1;border:none;background:none;color:var(--wa-text);font-size:14px;outline:none;resize:none;max-height:100px;line-height:1.4;padding:4px 0;font-family:inherit}
.chat-bar textarea::placeholder{color:var(--wa-text3)}
.chat-bar .sbtn{width:42px;height:42px;border-radius:50%;border:none;background:var(--wa-teal);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .2s}
.chat-bar .sbtn:hover{background:var(--wa-teal-dark)}
.chat-bar .sbtn:disabled{opacity:.4;cursor:not-allowed}
.chat-bar .sbtn svg{width:20px;height:20px;fill:#fff}
.chat-bar .embtn{width:36px;height:36px;border:none;background:none;color:var(--wa-text2);display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:50%;flex-shrink:0}
.chat-bar .embtn svg{width:22px;height:22px;fill:var(--wa-text2)}

#callScr{background:#000;z-index:100}
.call-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(30px) brightness(.3);transform:scale(1.2)}
.call-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5)}
.call-info{position:relative;z-index:5;text-align:center;padding-top:100px;flex:1;display:flex;flex-direction:column;align-items:center}
.call-info .cav{width:100px;height:100px;border-radius:50%;object-fit:cover;margin-bottom:16px;border:2px solid rgba(255,255,255,.2)}
.call-info h2{font-size:24px;font-weight:500;margin-bottom:4px}
.call-info .cst{font-size:14px;color:rgba(255,255,255,.7)}
.call-info .ctimer{font-size:15px;color:var(--wa-teal);margin-top:2px;font-variant-numeric:tabular-nums}
.call-vid{position:absolute;inset:0;z-index:2}
.call-vid video{width:100%;height:100%;object-fit:cover}
.pip{position:absolute;top:60px;right:16px;width:100px;height:140px;border-radius:12px;overflow:hidden;border:2px solid rgba(255,255,255,.2);z-index:8;background:#1a1a1a;cursor:grab}
.pip video{width:100%;height:100%;object-fit:cover}
.pip.off::after{content:'ক্যামেরা বন্ধ';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--wa-panel);font-size:11px;color:var(--wa-text2)}
.call-ctrls{position:relative;z-index:10;padding:30px 20px 50px;display:flex;align-items:center;justify-content:center;gap:20px;background:linear-gradient(to top,rgba(0,0,0,.8),transparent)}
.ccb{width:56px;height:56px;border-radius:50%;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.12);color:#fff;backdrop-filter:blur(8px)}
.ccb svg{width:24px;height:24px;fill:#fff}
.ccb .cl{font-size:9px;margin-top:3px;opacity:.8}
.ccb:active{transform:scale(.9)}
.ccb.off{background:var(--wa-danger)}
.ccb.end{width:64px;height:64px;background:var(--wa-danger)}
.ccb.end:hover{background:#c80030}

#incPop{position:absolute;inset:0;z-index:200;display:flex;align-items:flex-end;justify-content:center;background:var(--wa-overlay);backdrop-filter:blur(12px);opacity:0;visibility:hidden;transition:all .3s}
#incPop.on{opacity:1;visibility:visible}
.inc-card{width:100%;padding:36px 24px 48px;background:var(--wa-dark);border-radius:20px 20px 0 0;text-align:center;transform:translateY(100%);transition:transform .45s cubic-bezier(.34,1.56,.64,1)}
#incPop.on .inc-card{transform:translateY(0)}
.inc-handle{width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:4px;margin:0 auto 24px}
.inc-av{width:90px;height:90px;border-radius:50%;object-fit:cover;margin-bottom:16px;border:2px solid rgba(255,255,255,.15);animation:ir 2s ease-in-out infinite}
@keyframes ir{0%,100%{box-shadow:0 0 0 0 rgba(0,168,132,.4)}50%{box-shadow:0 0 0 12px rgba(0,168,132,0)}}
.inc-name{font-size:22px;font-weight:500;margin-bottom:4px}
.inc-type{font-size:13px;color:var(--wa-text2);margin-bottom:32px}
.inc-btns{display:flex;justify-content:center;gap:50px}
.inc-b{display:flex;flex-direction:column;align-items:center;gap:8px;border:none;background:none;cursor:pointer}
.inc-b .cir{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .2s}
.inc-b .cir svg{width:28px;height:28px;fill:#fff}
.inc-b.acc .cir{background:var(--wa-teal)}
.inc-b.rej .cir{background:var(--wa-danger)}
.inc-b:active .cir{transform:scale(.9)}
.inc-b span:last-child{font-size:11px;color:var(--wa-text2)}

.set-list{flex:1;overflow-y:auto;padding:8px 0}
.set-item{display:flex;align-items:center;gap:14px;padding:14px 20px;cursor:pointer;transition:background .15s}
.set-item:hover{background:rgba(255,255,255,.03)}
.set-item .si-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.set-item .si-icon svg{width:20px;height:20px;fill:#fff}
.set-item .si-text h4{font-size:15px;font-weight:400}
.set-item .si-text p{font-size:12px;color:var(--wa-text2);margin-top:1px}
.set-divider{height:8px;background:rgba(0,0,0,.2)}
.set-header{padding:20px 20px 12px;font-size:13px;color:var(--wa-teal);font-weight:500}

.grp-form{padding:16px 20px;display:flex;flex-direction:column;gap:14px}
.grp-form input{width:100%;padding:12px 14px;background:var(--wa-panel);border:none;border-radius:var(--radius);color:var(--wa-text);font-size:14px;outline:none}
.grp-form input:focus{box-shadow:0 0 0 2px var(--wa-teal)}
.grp-members{max-height:250px;overflow-y:auto}
.grp-members .gm{display:flex;align-items:center;gap:10px;padding:8px 0}
.grp-members .gm label{flex:1;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:10px}
.grp-members .gm input[type=checkbox]{width:18px;height:18px;accent-color:var(--wa-teal)}
.grp-members .gm img{width:36px;height:36px;border-radius:50%;object-fit:cover}

#secOverlay{position:fixed;inset:0;z-index:99998;pointer-events:none;display:none}
#secOverlay.on{display:block}

.sp{width:22px;height:22px;border:2.5px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

.ring-circles{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:3}
.ring-circles .rc{position:absolute;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);animation:rcp 2.5s ease-out infinite}
.ring-circles .rc:nth-child(1){width:130px;height:130px;animation-delay:0s}
.ring-circles .rc:nth-child(2){width:180px;height:180px;animation-delay:.6s}
.ring-circles .rc:nth-child(3){width:230px;height:230px;animation-delay:1.2s}
@keyframes rcp{0%{transform:scale(.8);opacity:.6}100%{transform:scale(1.2);opacity:0}}

.fab{position:absolute;bottom:20px;right:16px;width:56px;height:56px;border-radius:16px;border:none;background:var(--wa-teal);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.3);z-index:5;transition:transform .2s}
.fab:hover{transform:scale(1.05)}
.fab svg{width:24px;height:24px;fill:#fff}

.empty-st{text-align:center;padding:60px 20px;color:var(--wa-text2)}
.empty-st svg{width:64px;height:64px;fill:var(--wa-text3);margin-bottom:16px;opacity:.5}
.empty-st p{font-size:14px;line-height:1.6}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
@supports(padding-top:env(safe-area-inset-top)){.topbar{padding-top:env(safe-area-inset-top)}.call-ctrls{padding-bottom:calc(env(safe-area-inset-bottom)+20px)}.inc-card{padding-bottom:calc(env(safe-area-inset-bottom)+36px)}}
</style>
</head>
<body>
<div id="app">
<div id="toast"></div>
<div id="secOverlay"></div>

<!-- ফোন নম্বর -->
<section id="phoneScr" class="scr on" aria-label="ফোন নম্বর">
<div class="login-bg"></div>
<div class="login-card">
<div class="login-logo"><svg viewBox="0 0 24 24"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 0 0-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg></div>
<h1>Personal Call</h1>
<p class="sub">রিয়েল নম্বর দিয়ে রেজিস্টার করুন ও কল ও চ্যাট করুন</p>
<div class="fg">
<input type="tel" id="phoneIn" placeholder="আপনার ফোন নম্বর (যেকোনো দেশের)" maxlength="15" autocomplete="off">
<svg class="fi" viewBox="0 0 24 24"><path d="M6.62 10.79a15.053 15.053 0 0 0 6.59 6.59l2.2-2.2a1.003 1.003 0 0 1 1.01-.24c1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.1.31.03.66-.25 1.02l-2.2 2.2z"/></svg>
</div>
<button class="pbtn" id="sendOtpBtn">ভেরিফিকেশন কোড পাঠান</button>
<div class="divider">অথবা</div>
<button class="pbtn gbtn" id="googleLoginBtn">
<svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
Google দিয়ে সাইন ইন করুন
</button>
<button class="lnk" id="showEmailLogin">ইমেইল দিয়ে সাইন ইন করুন</button>
</div>
</section>

<!-- ইমেইল -->
<section id="emailScr" class="scr" aria-label="ইমেইল লগইন">

<button class="back" id="emailBack"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
<div class="info"><h3>ইমেইল সাইন ইন</h3></div>
</div>
<div style="flex:1;padding:24px 20px;display:flex;flex-direction:column;gap:14px;justify-content:center">
<div class="fg" id="emailNameGrp" style="display:none">
<input type="text" id="emailNameIn" placeholder="আপনার নাম" autocomplete="off">
<svg class="fi" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
</div>
<div class="fg">
<input type="email" id="emailAddrIn" placeholder="ইমেইল ঠিকানা" autocomplete="off">
<svg class="fi" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
</div>
<div class="fg">
<input type="password" id="emailPassIn" placeholder="পাসওয়ার্ড (ন্যূনতম ৬ অক্ষর)">
<svg class="fi" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
</div>
<button class="pbtn" id="emailSubmitBtn">সাইন ইন করুন</button>
<button class="lnk" id="toggleEmailReg">নতুন অ্যাকাউন্ট তৈরি করুন</button>

<!-- OTP -->
<section id="otpScr" class="scr" aria-label="OTP ভেরিফিকেশন">

<button class="back" id="otpBack"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
<div class="info"><h3>ভেরিফিকেশন কোড</h3><p id="otpPhone">-</p></div>
</div>
<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px">
<p style="font-size:14px;color:var(--wa-text2);text-align:center;margin-bottom:20px;line-height:1.6">আপনার ফোনে পাঠানো ৬ সংখ্যার কোড টাইপ করুন</p>

<input type="tel" maxlength="1" inputmode="numeric"><input type="tel" maxlength="1" inputmode="numeric">
<input type="tel" maxlength="1" inputmode="numeric"><input type="tel" maxlength="1" inputmode="numeric">
<input type="tel" maxlength="1" inputmode="numeric"><input type="tel" maxlength="1" inputmode="numeric">
</div>
<button class="pbtn" id="verifyOtpBtn" style="margin-top:24px;max-width:300px">ভেরিফাই করুন</button>
<div class="otp-resend" id="otpResend">কোড পুনরায় পাঠান <button id="resendBtn" disabled>(<span id="resendTimer">60</span>s)</button></div>
</div>
</section>

<!-- মূল -->

</div>
</div>
<div class="tabs">

<button class="tab" data-tab="calls">কল</button>
<button class="tab" data-tab="groups">গ্রুপ</button>
</div>
<div id="tabChats" class="chats-c" style="flex:1;overflow-y:auto"></div>

<section id="chatScr" class="scr from-l" aria-label="চ্যাট">

</div>
<div class="msgs-c" id="msgsC"></div>

</div>
</section>

</div>

<button class="ccb" id="camBtn" aria-label="ক্যামেরা"><svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg><span class="cl">ক্যামেরা</span></button>
<button class="ccb" id="spkBtn" aria-label="স্পিকার"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg><span class="cl">স্পিকার</span></button>

</div>
</section>

<!-- ইনকামিং কল -->
<div id="incPop" role="dialog" aria-label="ইনকামিং কল">

<div class="inc-type" id="incType">ভিডিও কল</div>

<button class="inc-b acc" id="accBtn"><div class="cir"><svg viewBox="0 0 24 24" id="accIco"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 0 0-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg></div><span>একসেপ্ট</span></button>
</div>
</div>
</div>
</div>
